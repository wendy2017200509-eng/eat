<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>점심 추천 AI 챗봇</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Pretendard', sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:100%;
    max-width:450px;
    height:100vh;
    background:white;
    display:flex;
    flex-direction:column;
}

.header{
    background:linear-gradient(135deg,#ff7e5f,#feb47b);
    color:white;
    text-align:center;
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

.chat-area{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.message{
    max-width:80%;
    padding:12px 15px;
    border-radius:15px;
    line-height:1.5;
    word-break:keep-all;
}

.user{
    align-self:flex-end;
    background:#ffe4d6;
}

.bot{
    align-self:flex-start;
    background:#f1f1f1;
}

.input-area{
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
    font-size:16px;
}

button{
    margin-left:10px;
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#ff7e5f;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#ff6347;
}

@media(max-width:600px){
    .container{
        max-width:100%;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        🍱 점심 추천 AI 챗봇
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message bot">
            안녕하세요 😊<br>
            "점심 때 뭐 먹지?" 라고 물어보세요!
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="메시지를 입력하세요">
        <button onclick="sendMessage()">전송</button>
    </div>

</div>

<script>

const foods = {

    "한식":[
        "김치찌개","된장찌개","순두부찌개","부대찌개","제육볶음",
        "불고기","비빔밥","돌솥비빔밥","냉면","물냉면",
        "비빔냉면","삼겹살","보쌈","족발","감자탕",
        "뼈해장국","갈비탕","설렁탕","육개장","칼국수"
    ],

    "중식":[
        "짜장면","짬뽕","볶음밥","탕수육","유린기",
        "깐풍기","마파두부","고추잡채","양장피","유산슬",
        "잡채밥","쟁반짜장","삼선짬뽕","깐쇼새우","마라탕"
    ],

    "일식":[
        "초밥","회덮밥","돈까스","치즈돈까스","냉모밀",
        "우동","가츠동","규동","오야코동","카레라이스",
        "라멘","텐동","사케동","나베","오므라이스"
    ]
};

function addMessage(text, type){
    const chatArea = document.getElementById("chatArea");

    const div = document.createElement("div");
    div.className = `message ${type}`;
    div.innerHTML = text;

    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function getRandomFood(){
    const categories = Object.keys(foods);
    const category = categories[Math.floor(Math.random()*categories.length)];

    const menu = foods[category][
        Math.floor(Math.random()*foods[category].length)
    ];

    return {
        category:category,
        menu:menu
    };
}

function sendMessage(){

    const input = document.getElementById("userInput");
    const text = input.value.trim();

    if(text === "") return;

    addMessage(text,"user");

    let response = "";

    if(
        text.includes("점심") ||
        text.includes("뭐 먹지") ||
        text.includes("추천")
    ){
        const result = getRandomFood();

        response = `
        오늘의 점심 추천 🍴<br><br>
        📌 종류 : <b>${result.category}</b><br>
        🍽 메뉴 : <b>${result.menu}</b><br><br>
        마음에 안 들면 "다른 메뉴 추천"이라고 입력해줘 😆
        `;
    }
    else if(
        text.includes("다른") ||
        text.includes("또 추천")
    ){
        const result = getRandomFood();

        response = `
        새로운 추천 메뉴 🎉<br><br>
        📌 종류 : <b>${result.category}</b><br>
        🍽 메뉴 : <b>${result.menu}</b>
        `;
    }
    else{
        response = `
        저는 점심 추천 전문 AI입니다 😊<br>
        "점심 때 뭐 먹지?" 라고 입력해보세요!
        `;
    }

    setTimeout(()=>{
        addMessage(response,"bot");
    },500);

    input.value="";
}

document.getElementById("userInput").addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        sendMessage();
    }
});

</script>

</body>
</html>

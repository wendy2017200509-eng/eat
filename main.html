<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>연애 상담 챗봇</title>

<style>
body {
    font-family: Arial, sans-serif;
    width: 500px;
    margin: 30px auto;
}

#chatBox {
    height: 400px;
    border: 1px solid #ccc;
    padding: 10px;
    overflow-y: auto;
    margin-bottom: 10px;
}

.user {
    text-align: right;
    margin: 10px;
    color: blue;
}

.bot {
    text-align: left;
    margin: 10px;
    color: green;
}

input {
    width: 80%;
    padding: 10px;
}

button {
    width: 15%;
    padding: 10px;
}
</style>
</head>

<body>

<h2>💕 연애 상담 챗봇</h2>

<div id="chatBox">
    <div class="bot">
        안녕하세요! 연애 고민을 입력해주세요.
    </div>
</div>

<input type="text" id="userInput" placeholder="질문을 입력하세요">
<button onclick="sendMessage()">전송</button>

<script>

let qaData = [];

// CSV 파일 읽기
fetch("love_data.csv")
.then(response => response.text())
.then(data => {
    const rows = data.split("\n").slice(1);

    rows.forEach(row => {
        const cols = row.split(",");
        if(cols.length >= 2){
            qaData.push({
                question: cols[0].trim(),
                answer: cols[1].trim()
            });
        }
    });

    console.log("CSV 로드 완료");
});

function sendMessage() {

    const input = document.getElementById("userInput");
    const message = input.value.trim();

    if(message === "") return;

    addMessage(message, "user");

    let response = "죄송해요. 아직 준비된 답변이 없어요.";

    for(let item of qaData){
        if(message.includes(item.question) || item.question.includes(message)){
            response = item.answer;
            break;
        }
    }

    setTimeout(() => {
        addMessage(response, "bot");
    }, 500);

    input.value = "";
}

function addMessage(text, sender){
    const chatBox = document.getElementById("chatBox");

    const div = document.createElement("div");
    div.className = sender;
    div.innerText = text;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

</body>
</html>
